<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard con Carrusel</title>

    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-nowrap">

    <div class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark" style="width: 280px; height: 100vh;">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-4">Mi Panel</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link active"><i class="bi bi-house me-2"></i> Home</a>
            </li>
            <li>
                <a href="#" class="nav-link text-white"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" data-bs-toggle="modal" data-bs-target="#modalSubirFoto">
                    <i class="bi bi-cloud-arrow-up me-2"></i> Subir Foto
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" data-bs-toggle="modal" data-bs-target="#modalCRUD">
                    <i class="bi bi-pencil-square me-2"></i> Gestionar Galería
                </a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
                id="dropdownUser1" data-bs-toggle="dropdown">
                <img src="https://github.com/mdo.png" alt="" width="32" height="32" class="rounded-circle me-2">
                <strong>Usuario</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                <li><a class="dropdown-item" href="#">Perfil</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>

    <div class="flex-grow-1">
        <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators" id="indicadoresDinamicos">
            </div>
            <div class="carousel-inner" id="carruselDinamico">
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
                data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalCRUD" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg text-dark">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Administrar Imágenes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="listaImagenes" class="row g-3">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSubirFoto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog text-dark">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Subir Nueva Imagen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formSubirImagen">
                        <div class="mb-3">
                            <label class="form-label">Seleccionar Archivo</label>
                            <input type="file" name="foto" id="inputFoto" class="form-control" accept=".jpg,.png,.jpeg"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nombre de la Imagen</label>
                            <input type="text" id="nombreImagen" class="form-control"
                                placeholder="Ej: Paisaje de montaña" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea id="descImagen" class="form-control" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar e Insertar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="./wwwroot/js/bootstrap.bundle.min.js"></script>
    <script src="./wwwroot/js/carrousel.js"></script>
</body>

</html>
