    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link href="./wwwroot/css/carousel.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
</head>

<body>

    <!-- NAVBAR SUPERIOR -->
    <header class="navbar navbar-dark bg-dark sticky-top shadow">

        <!-- Botón hamburguesa -->
        <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <a class="navbar-brand px-3" href="#">Mi Panel</a>

    </header>

    <div class="d-flex">

        <!-- 🔥 SIDEBAR -->
        <div id="sidebarMenu" class="collapse d-md-block bg-dark text-white p-3 sidebar">

            <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none">
                <span class="fs-4">Mi Panel</span>
            </a>

            <hr>

            <ul class="nav nav-pills flex-column mb-auto">

                <li>
                    <a href="#" class="nav-link text-white" data-bs-toggle="modal" data-bs-target="#modalSubirFoto">
                        <i class="bi bi-cloud-arrow-up me-2"></i> Subir Foto
                    </a>
                </li>

                <li>
                    <a href="#" class="nav-link text-white" data-bs-toggle="modal" data-bs-target="#modalCRUD">
                        <i class="bi bi-pencil-square me-2"></i> Gestionar Galería
                    </a>
                </li>
            </ul>

            <hr>

            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
                    data-bs-toggle="dropdown">
                    <img src="https://github.com/mdo.png" width="32" height="32" class="rounded-circle me-2">
                    <strong>Usuario</strong>
                </a>

                <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                    <li><a class="dropdown-item" href="#">Perfil</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" href="logout.php">Cerrar sesión</a></li>
                </ul>
            </div>

        </div>

        <div class="flex-grow-1 p-3 main-content">
            <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="false">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <!-- Se corrigió el cierre de la etiqueta antes del alt -->
                        <img id="current-img" src="./uploads/uploads/1778649555_malteada.png" class="img-fluid"
                            style="height: 400px;" alt="Cargando...">
                        <div class="carousel-caption d-none d-md-block">
                            <h5 id="current-img-title">Título de la imagen</h5>
                        </div>
                    </div>
                </div>

                <!-- Los botones ya no necesitan parámetros, leen la variable global -->
                <button class="carousel-control-prev" type="button" onclick="anteriorImagen();">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" onclick="siguienteImagen();">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

    </div>

    <!-- CRUD -->
    <div class="modal fade" id="modalCRUD" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg text-dark">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Administrar Imágenes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="listaImagenes" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Subir imagen -->
    <div class="modal fade" id="modalSubirFoto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog text-dark">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Subir Nueva Imagen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formSubirImagen">
                        <div class="mb-3">
                            <label class="form-label">Seleccionar Archivo</label>
                            <input type="file" name="foto" id="inputFoto" class="form-control" accept=".jpg,.png,.jpeg"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre de la imagen</label>
                            <input type="text" id="nombreImagen" class="form-control"
                                placeholder="Ej: Paisaje de montaña" required>
                        </div>

                        <button type="button" onclick="subirImagen();" class="btn btn-primary w-100">
                            Guardar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="./wwwroot/js/bootstrap.bundle.min.js"></script>
    <script src="./wwwroot/js/carrousel.js"></script>

</body>

</html>
