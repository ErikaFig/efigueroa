<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
  <link href="./wwwroot/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
  <script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
  <script src="./wwwroot/js/script.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <main id="main">
    <div class="container-lg d-flex flex-column">
      <div class="row align-items-center justify-content-center no-gutters">
        <div class="col-md-7 col-lg-5">
          <div class="shadow mt-5 p-5 bg-white rounded-3 border">
            <div class="w-100 text-center">
              <h1 class="display-6"> Inciar sesión</h1>
              <p class="text-muted">Use sus credenciales para iniciar sesión</p>
            </div>

            <form class="needs-validation" novalidate>
              <div class="col-12">

                <!-- Correo -->
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input class="form-control" id="email">
                  <div class="invalid-feedback">
                    ingresa tu correo
                  </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                  <label for="pwd" class="form-label">Contraseña</label>
                  <input class="form-control" type="password" id="pwd">
                  <div class="invalid-feedback">
                    Escribe tu contraseña
                  </div>
                </div>


                <div class="d-flex justify-content-between py-3">
                  <div>
                    <span class="small text-muted">¿No tienes cuenta?</span>
                    <a class="small" href="registro.html"> Crear cuenta</a>
                  </div>
                  <button class="btn btn-outline-primary" onclick="login();"> Iniciar sesión</button>

                </div>
              </div>

            </form>
          </div>

        </div>

      </div>

    </div>
  </main>
  <script src="./wwwroot/js/validacion.js"></script>
</body>
</html>
